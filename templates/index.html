{% block title %}{% endblock %}

{% block content %}

{% if message  %}
    <div class="alert alert-secondary" role="alert">
        <p>{{ message }}</p>
    </div>
{% endif %}
<head>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
</head>


<section class="vh-100" style="background-image: url('https://i.makeagif.com/media/4-29-2016/yjdXBi.gif');">
  <div class="container h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-lg-12 col-xl-11">
        <div class="card text-black" style="border-radius: 25px;">
          <div class="card-body p-md-5">
            <div class="row justify-content-center">
              <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">

                <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4">Sign up</p>

                <form action="" method="post">
                  <div class="form-group">
                      <label for="Fullname">Full name</label>
                      <input name="fullname" class="form-control" id="inputFullName" aria-describedby="emailHelp" placeholder="Enter full name">
                      <br>
                </div>
                <div class="form-group">
                      <label for="InputEmail">Email address</label>
                      <input name="email" class="form-control" id="InputEmail"  placeholder="Enter email">
                     <br>
                </div>
                <div class="form-group">
                  <label for="InputPassword">Password</label>
                  <input type="password" name="password1" class="form-control" id="InputPassword" placeholder="Password">
                </div>
                  <br>
                  <div class="form-group">
                  <label for="InputPassword2">Repeat Password</label>
                  <input type="password" name="password2" class="form-control" id="InputPassword2" placeholder="Repeat Password">
                    <br>
                  </div>
                <button type="submit" class="btn btn-success">Submit</button>
                <p class="small fw-bold mt-2 pt-1 mb-0">Have already an account? <a href="login"
                  class="link-danger">Login here</a></p>
              </form>

              </div>
              <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">

                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                  class="img-fluid" alt="Sample image">

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<footer class="bg-light text-center text-lg-start">
  <!-- Copyright -->
  <div class="text-center p-3" style="background-color: rgba(255, 0, 0, 0.2);">
    © 2023 Copyright -
    <a class="text-dark" href="https://karthikeya16.netlify.app/">KarthikeyaGuruju</a>
  </div>
  <!-- Copyright -->
</footer>
