<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

.topnav {
  overflow: hidden;
  background-color: #333;
}

.topnav a {
  float: left;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
}

.topnav a:hover {
  background-color: #ddd;
  color: black;
}

.topnav a.active {
  background-color: #aa6204;
  color: white;
}

.nav1 {
  overflow: hidden;
  background-color: #333;
}

.nav1 a {
  float: right;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
}

.nav1 a:hover {
  background-color: #ddd;
  color: black;
}

.nav1 a.active {
  background-color: #aa6204;
  color: white;
}
</style>
</head>
<body>

<div class="topnav" style="background-color: #024554;">
  <a class="active" href="#">Easy Pick </a>
  <a href="about">About Us</a>
  <a href="contact">Contact Us</a>
<div class = "nav1" style="background-color:  #024554;"> 
  <a class="glyphicon glyphicon-log-in" href="login">Login</a>
  <a href="logout">Logout</a>
</div>
</div>



<div style="padding-left:16px">
  
</div>

</body>
</html>
